<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="description" content="Webpage description goes here" />
  <meta charset="utf-8">
  <title>Change_me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="">
  <link rel="stylesheet" href="css/main.css">
  <script src="http://code.jquery.com/jquery-latest.min.js"></script>
</head>

<body>
  
<div class="container">

<header class="app-header">
  <a href="#" class="app-header__logo">ShopDemo</a>
  <nav class="app-header__nav">
    <a href="#" class="app-header__nav-link">New Arrivals</a>
    <a href="#" class="app-header__nav-link">Men</a>
    <a href="#" class="app-header__nav-link">Women</a>
    <a href="#" class="app-header__nav-link">Sale</a>
  </nav>

  <button class="app-header__hamburger" aria-label="Toggle menu">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
</header>

<div class="app-body">
  <aside class="sidebar">
    <h3 class="sidebar__title">Filters</h3>
    <div class="filter-group">
      <span class="filter-group__title">Category</span>
      <label class="filter-group__item"><input type="checkbox" disabled /> Electronics</label>
      <label class="filter-group__item"><input type="checkbox" disabled /> Fashion</label>
    </div>
    <div class="filter-group">
      <span class="filter-group__title">Price Range</span>
      <label class="filter-group__item"><input type="radio" name="p" disabled /> Under $50</label>
      <label class="filter-group__item"><input type="radio" name="p" disabled /> $50 - $200</label>
    </div>
  </aside>

  <main class="main-content">
    <div class="main-content__header">
      <h1 class="main-content__title">Products</h1>
      <button class="main-content__filter-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        <span>Filters</span>
      </button>
    </div>

    <div class="product-grid">
      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=600&auto=format&fit=crop&q=60" alt="Black Sneakers" class="product-card__image" />
        <div class="product-card__overlay"></div>
        <div class="product-card__content">
          <h2 class="product-card__title">Urban Runner X1</h2>
          <span class="product-card__price">$149.00</span>
        </div>
      </article>
      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&auto=format&fit=crop&q=60" alt="White Watch" class="product-card__image" />
        <div class="product-card__overlay"></div>
        <div class="product-card__content">
          <h2 class="product-card__title">Minimalist Chrono</h2>
          <span class="product-card__price">$299.00</span>
        </div>
      </article>
      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1581235720704-06d3acfcb36f?w=600&auto=format&fit=crop&q=60" alt="Interior Lamp" class="product-card__image" />
        <div class="product-card__overlay"></div>
        <div class="product-card__content">
          <h2 class="product-card__title">Nordic Ambient Light</h2>
          <span class="product-card__price">$89.00</span>
        </div>
      </article>
      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format&fit=crop&q=60" alt="White Watch" class="product-card__image" />
        <div class="product-card__overlay"></div>
        <div class="product-card__content">
          <h2 class="product-card__title">Air Runner</h2>
          <span class="product-card__price">$129.00</span>
        </div>
      </article>
      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&auto=format&fit=crop&q=60" alt="Black Sneakers" class="product-card__image" />
        <div class="product-card__overlay"></div>
        <div class="product-card__content">
          <h2 class="product-card__title">Headphones</h2>
          <span class="product-card__price">$129.00</span>
        </div>
      </article>
    </div>
  </main>
</div>

<footer class="app-footer">
  <p>&copy; 2024 LinXiang ShopDemo. All rights reserved.</p>
</footer>

</div>

<script>
</script>

</body>
</html>
